<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursos Destacados - Coursera</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f0f4f8;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.15), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        .coursera-blue {
            color: #0056D2;
        }
        .bg-coursera-blue {
            background-color: #0056D2;
        }
    </style>
</head>
<body class="p-8">

    <div class="max-w-7xl mx-auto">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold coursera-blue mb-3">Cursos Destacados de Coursera</h1>
            <h2 class="text-xl font-medium text-gray-600">Encuentra los programas más populares y nuevos lanzamientos</h2>
        </div>
        
        <p class="text-center text-gray-500 mb-10" id="contador">Cargando cursos...</p>

        <div id="grid-cursos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Las cards se inyectarán aquí mediante JavaScript -->
        </div>
    </div>

    <script>
        async function cargarCursos() {
            try {
                const respuesta = await fetch('cursos_coursera.json');
                const cursos = await respuesta.json();
                
                const grid = document.getElementById('grid-cursos');
                const contador = document.getElementById('contador');
                
                contador.innerText = `Se encontraron ${cursos.length} cursos y certificaciones destacados en la página principal`;

                cursos.forEach(curso => {
                    const card = document.createElement('a');
                    card.href = curso.url;
                    card.target = '_blank';
                    card.className = "card bg-white rounded-xl p-6 border border-gray-200 transition-all duration-300 flex flex-col cursor-pointer";
                    
                    // Determinar el tipo de programa por la URL
                    let tipoPrograma = "Curso";
                    let bgColor = "bg-blue-100 text-blue-800";
                    if (curso.url.includes('/professional-certificates/')) {
                        tipoPrograma = "Certificado Profesional";
                        bgColor = "bg-yellow-100 text-yellow-800";
                    } else if (curso.url.includes('/specializations/')) {
                        tipoPrograma = "Especialización";
                        bgColor = "bg-purple-100 text-purple-800";
                    }

                    card.innerHTML = `
                        <div class="flex-grow">
                            <span class="inline-block px-3 py-1 ${bgColor} text-xs font-bold rounded-full mb-4">${tipoPrograma}</span>
                            <h3 class="text-lg font-bold text-gray-900 leading-tight mb-3">${curso.titulo}</h3>
                            <p class="text-gray-500 text-sm font-medium line-clamp-2">Aprende nuevas habilidades con Coursera</p>
                        </div>
                        <div class="mt-5 pt-4 border-t border-gray-100 flex items-center coursera-blue font-bold text-sm">
                            Ir al curso
                            <svg class="w-4 h-4 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </div>
                    `;
                    
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error("Error al cargar los cursos:", error);
                document.getElementById('contador').innerText = "Error al cargar los datos. Recuerda usar un servidor local (Live Server).";
            }
        }

        window.onload = cargarCursos;
    </script>
</body>
</html>
