<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fundación Carlos Slim - Educación</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #fafafa;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="p-8">

    <div class="max-w-7xl mx-auto">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-blue-900 mb-3">Programas de Educación</h1>
            <h2 class="text-2xl font-medium text-gray-600">Fundación Carlos Slim</h2>
        </div>
        
        <p class="text-center text-gray-500 mb-10" id="contador">Cargando programas...</p>

        <div id="grid-programas" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Las cards se inyectarán aquí mediante JavaScript -->
        </div>
    </div>

    <script>
        async function cargarProgramas() {
            try {
                const respuesta = await fetch('programas_carlosslim.json');
                const programas = await respuesta.json();
                
                const grid = document.getElementById('grid-programas');
                const contador = document.getElementById('contador');
                
                contador.innerText = `Se encontraron ${programas.length} programas e iniciativas educativas`;

                programas.forEach(programa => {
                    const card = document.createElement('a');
                    card.href = programa.url;
                    card.target = '_blank';
                    card.className = "card bg-white rounded-xl p-6 border border-gray-200 transition-all duration-300 flex flex-col cursor-pointer";
                    
                    card.innerHTML = `
                        <div class="flex-grow">
                            <span class="inline-block px-3 py-1 bg-blue-50 text-blue-700 border border-blue-200 text-xs font-bold rounded-full mb-4">Iniciativa / Plataforma</span>
                            <h3 class="text-xl font-bold text-gray-800 leading-tight mb-3">${programa.title}</h3>
                            <p class="text-gray-600 text-sm leading-relaxed">${programa.description}</p>
                        </div>
                        <div class="mt-5 pt-4 border-t border-gray-100 flex items-center text-blue-600 font-bold text-sm">
                            Conocer más de la iniciativa
                            <svg class="w-4 h-4 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </div>
                    `;
                    
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error("Error al cargar los programas:", error);
                document.getElementById('contador').innerText = "Error al cargar los datos. Recuerda usar un servidor local (Live Server).";
            }
        }

        window.onload = cargarProgramas;
    </script>
</body>
</html>
