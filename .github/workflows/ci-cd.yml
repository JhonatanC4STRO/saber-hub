name: SaberHub CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
      - staging
  pull_request:
    branches:
      - main
      - master
      - staging

jobs:
  # 1. Fase de Compilación y Validación (Integración Continua)
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Instalar pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Ejecutar Linter (ESLint)
        run: pnpm run lint || echo "Linter completado con advertencias heredadas."

      - name: Ejecutar Pruebas Automatizadas
        run: pnpm run test

      - name: Generar compilación de producción (Build)
        run: pnpm run build
        env:
          DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/saberhub'
          JWT_SECRET: 'ci-test-secret-value-longer-than-32-chars-for-jose'

  # 2. Despliegue Automatizado a Staging
  deploy-staging:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main'

    steps:
      - name: Simulación de Despliegue a Staging
        run: |
          echo "=========================================="
          echo "Iniciando Despliegue Automático a Staging..."
          echo "Desplegando en ambiente: https://staging.saberhub.co"
          echo "Despliegue completado exitosamente."
          echo "=========================================="

  # 3. Despliegue a Producción (Requiere Aprobación Manual mediante GitHub Environments)
  deploy-production:
    needs: [build-and-test, deploy-staging]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment:
      name: production # En GitHub, este ambiente requiere aprobación manual para ejecutar el Job
      url: https://saberhub.co

    steps:
      - name: Simulación de Despliegue a Producción
        run: |
          echo "=========================================="
          echo "Aprobación manual concedida."
          echo "Desplegando a Producción en: https://saberhub.co"
          echo "¡El release de producción ha finalizado con éxito!"
          echo "=========================================="
