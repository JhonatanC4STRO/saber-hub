<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Glow blobs -->
  <ellipse cx="160" cy="200" rx="130" ry="100" fill="#3b82f6" opacity="0.12" filter="url(#blur)"/>
  <ellipse cx="640" cy="180" rx="120" ry="90" fill="#6366f1" opacity="0.12" filter="url(#blur)"/>

  <!-- Grid lines subtle -->
  <g stroke="#1e40af" stroke-width="0.6" opacity="0.25">
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="680" cy="80" r="60" stroke="#3b82f6" stroke-width="1.5" fill="none" opacity="0.3"/>
  <circle cx="680" cy="80" r="40" stroke="#3b82f6" stroke-width="1" fill="none" opacity="0.2"/>
  <circle cx="120" cy="320" r="50" stroke="#6366f1" stroke-width="1.5" fill="none" opacity="0.25"/>

  <!-- Graduation cap icon -->
  <g transform="translate(108, 130)">
    <!-- Hat board -->
    <polygon points="50,0 100,25 50,50 0,25" fill="url(#accent)" opacity="0.9"/>
    <!-- Hat base -->
    <rect x="30" y="34" width="40" height="28" rx="4" fill="#1d4ed8" opacity="0.85"/>
    <!-- Tassel string -->
    <line x1="100" y1="25" x2="100" y2="55" stroke="#60a5fa" stroke-width="2.5"/>
    <circle cx="100" cy="58" r="4" fill="#60a5fa"/>
  </g>

  <!-- Main title: SaberHub -->
  <text x="230" y="185" font-family="'Segoe UI', Arial, sans-serif" font-size="56" font-weight="800" letter-spacing="-1">
    <tspan fill="#ffffff">Saber</tspan><tspan fill="#60a5fa">Hub</tspan>
  </text>

  <!-- Subtitle -->
  <text x="231" y="225" font-family="'Segoe UI', Arial, sans-serif" font-size="18" fill="#93c5fd" letter-spacing="0.5" opacity="0.9">
    Plataforma LMS de nueva generación
  </text>

  <!-- Accent line under title -->
  <rect x="231" y="237" width="320" height="3" rx="2" fill="url(#accent)" opacity="0.7"/>

  <!-- Feature chips -->
  <g font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="500">
    <!-- Chip 1: Next.js -->
    <rect x="231" y="258" width="76" height="24" rx="12" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
    <text x="269" y="274" fill="#93c5fd" text-anchor="middle">Next.js 16</text>
    <!-- Chip 2: Prisma -->
    <rect x="317" y="258" width="68" height="24" rx="12" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
    <text x="351" y="274" fill="#93c5fd" text-anchor="middle">Prisma 7</text>
    <!-- Chip 3: PostgreSQL -->
    <rect x="395" y="258" width="90" height="24" rx="12" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
    <text x="440" y="274" fill="#93c5fd" text-anchor="middle">PostgreSQL</text>
    <!-- Chip 4: TypeScript -->
    <rect x="495" y="258" width="90" height="24" rx="12" fill="#1e3a5f" stroke="#6366f1" stroke-width="1"/>
    <text x="540" y="274" fill="#a5b4fc" text-anchor="middle">TypeScript</text>
  </g>

  <!-- Right side: stats cards -->
  <g transform="translate(595, 120)">
    <!-- Card 1 -->
    <rect x="0" y="0" width="155" height="60" rx="12" fill="#0f2744" stroke="#1e40af" stroke-width="1"/>
    <text x="16" y="24" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="#3b82f6">40+</text>
    <text x="16" y="44" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#64748b">Modelos de BD</text>

    <!-- Card 2 -->
    <rect x="0" y="74" width="155" height="60" rx="12" fill="#0f2744" stroke="#1e40af" stroke-width="1"/>
    <text x="16" y="98" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="#6366f1">20+</text>
    <text x="16" y="118" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#64748b">API Endpoints</text>

    <!-- Card 3 -->
    <rect x="0" y="148" width="155" height="60" rx="12" fill="#0f2744" stroke="#1e40af" stroke-width="1"/>
    <text x="16" y="172" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="#10b981">4</text>
    <text x="16" y="192" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#64748b">Roles de usuario</text>
  </g>

  <!-- Bottom tagline -->
  <text x="400" y="370" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#475569" text-anchor="middle" letter-spacing="2">
    EDUCACIÓN EN LÍNEA · COLOMBIA · OPEN PLATFORM
  </text>
</svg>
